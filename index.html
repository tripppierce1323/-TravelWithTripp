<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelWithTripp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <section class="hero">
        <h1>TravelWith<span>Tripp</span></h1>
        <p class="tagline">Luxury Travel • Smart Rewards</p>

        <h2>Smarter rewards.<br />Better trips.</h2>
        <p class="subtext">
          Turn everyday spend into luxury travel experiences.
        </p>
      </section>

      <section class="cardsSection">
        <h3>Featured Travel Cards</h3>

        <div class="cardsGrid">

          <div class="cardBox">
            <h4>Amex Gold</h4>
            <img src="https://i.imgur.com/3yaf3YF.png" />
            <p class="bonus">4x dining & groceries</p>
            <button>View Card</button>
          </div>

          <div class="cardBox">
            <h4>Amex Platinum</h4>
            <img src="https://i.imgur.com/B7R8K9C.png" />
            <p class="bonus">Luxury travel perks</p>
            <button>View Card</button>
          </div>

          <div class="cardBox">
            <h4>Venture X</h4>
            <img src="https://i.imgur.com/YcK0p7Q.png" />
            <p class="bonus">2x everywhere</p>
            <button>View Card</button>
          </div>

        </div>
      </section>
    </div>
  </body>
</html>
