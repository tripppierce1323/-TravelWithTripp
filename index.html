<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelWithTripp</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- MAIN CONTENT -->
  <div id="content"></div>

  <!-- SIMPLE NAV MENU (OPTIONAL) -->
  <div id="menu" class="menu">
    <a href="#" onclick="loadPage('home.html')">Home</a>
    <a href="#" onclick="loadPage('wallet.html')">My Wallet</a>
    <a href="#" onclick="loadPage('bonuses.html')">Best Welcome Offers</a>
    <a href="#" onclick="loadPage('trips.html')">Trip Itineraries</a>
    <a href="#" onclick="loadPage('calculator.html')">Calculator</a>
    <a href="#" onclick="loadPage('tracker.html')">Tracker</a>
    <a href="#" onclick="loadPage('about.html')">About Me</a>
  </div>

  <script>
    function loadPage(page) {
      fetch("pages/" + page)
        .then(res => res.text())
        .then(html => {
          document.getElementById("content").innerHTML = html;
          window.scrollTo(0, 0);
        });
    }

    function toggleMenu() {
      document.getElementById("menu").classList.toggle("open");
    }

    // Load homepage by default
    loadPage("home.html");
  </script>

</body>
</html>
